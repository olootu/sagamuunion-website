<app-loading [data]="projects"></app-loading>
<div class="project" *ngIf="projects.length > 0">
  <h1 class="cent">Our current and future projects</h1>
  <div class="carousel">
    <mat-carousel  color="accent" maxWidth="20" [loop]="true" 
       [useMouseWheel]="false" orientation="ltr" [hideArrows]="false" [hideIndicators]="false" [useKeyboard]="true">
      <mat-carousel-slide *ngFor="let project of projects | sortBy:['date', 'DESC']"
        overlayColor="#000000" [hideOverlay]="true" slides="15">
        <img *ngIf="project._embedded?.['wp:featuredmedia']?.[0]?.source_url || project.featured_url" 
             [src]="project._embedded?.['wp:featuredmedia']?.[0]?.source_url || project.featured_url" 
             alt="Project image" style="width: 100%; height: 100%; object-fit: cover;">
        <h2 class="carousel-item-description">{{project?.title?.rendered}}</h2>
      </mat-carousel-slide>

    </mat-carousel>
  </div>
